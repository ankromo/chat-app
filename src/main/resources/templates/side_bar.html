<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
  <div th:fragment="side_bar">
    <div class="side-header">
      <div class="name-b">
      <a th:href="@{/users/{userId}/edit(userId=${user.id})}" th:text="${user.name}">ユーザー名</a>
    </div>
    <div class="chat-b">
      <a th:href="@{/rooms/new}">チャットを作成する</a>
      </div>
    
    </div>

    <div class="rooms">
      <div th:each="room : ${rooms}" class="room">
      <div class="room-name">
      <a th:href="@{/rooms/{roomId}/messages(roomId=${room.id})}" th:text="${room.name}">room</a>
      </div>
      </div>
      

    </div>
  </div>
</html>
